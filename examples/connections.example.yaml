# biz-connect attachpoints for this repo.
#
# COMMITTED, and contains NO secrets — only IDs/URLs, which are not sensitive.
# Credentials live in the per-user central store (~/.config/biz-connect).
# Copy this to your repo root as `connections.yaml` (or run `bizconnect init`).

google:
  # New Google Docs created by `gdoc push` are shared back to this address (Editor),
  # so they appear in your own Drive (the service account can't surface a UI).
  share_with: you@example.com

  # Optional: create new Docs inside this Drive folder or shared drive
  # (paste the folder URL or its id). Leave blank to use share_with instead.
  drive_folder:

  # local-Markdown -> Google Doc bindings. `gdoc push <file>` fills these in on
  # first push; `gdoc link <file> <url>` binds an existing Doc. Keys are repo-relative.
  docs: {}
    # response/draft.md:
    #   doc_id: 1AbC...
    #   url: https://docs.google.com/document/d/1AbC.../edit

notion:
  # Default page for `notion <verb> .` (the "." shorthand). Paste a page URL or id.
  notes_page:
  # Optional named databases, e.g. tasks: <db-id>
  # databases: {}
  # Open-points register for review feedback (the feedback-ingest loop). Created + bound by
  # `bizconnect register init`; the ingestion pass upserts rows here.
  # register_db:
  #   url:
  #   database_id:
  #   project_to: register/open-points.md   # local read-only projection the pipeline reads
  #   journal: register/journal             # per-cycle ingestion journal (audit trail)
  # Document registry — one row per produced Doc instance/version. `gdoc push --new --version
  # vX.Y` creates a new Doc instance for a major build and logs a row here (plain pushes refresh
  # the current row). Created + bound by `bizconnect docreg init`.
  # docs_registry:
  #   url:
  #   database_id:
  #   project_to: register/doc-versions.md  # optional local projection of the table

# Shared, scoped credentials pulled from a secret manager into the per-user central
# store (`bizconnect secrets pull`). The team holds ONE scoped Notion token + Google SA
# key; access is granted by an IAM group and each person pulls with their OWN identity
# (`gcloud auth application-default login`) — no key is handed around. IDs only here.
# secrets:
#   provider: gcp
#   project: my-gcp-project-id          # or set $GOOGLE_CLOUD_PROJECT
#   pull:
#     - name: myrepo-notion-token       # Secret Manager secret id
#       env: NOTION_TOKEN               # -> upsert KEY=value in secrets.env
#     - name: myrepo-google-sa-key
#       file: service-account.json      # -> write into the central store
#       # version: latest               # optional (default: latest)

git:
  protected: [main, master]
  # co_author: "Claude <noreply@anthropic.com>"   # appended to `git save` commits

# Input source documents this repo draws on. READ-ONLY: `bizconnect compose run inputs`
# syncs each into its extract_to Markdown copy and never writes back to the source.
# This is also a register of provenance (who/when/review) for those inputs.
inputs: {}
