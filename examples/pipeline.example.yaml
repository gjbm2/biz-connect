# biz-connect `compose` — document-composition pipeline config for this repo.
#
# COMMITTED, NO secrets. Copy to your repo root as `pipeline.yaml`.
# `compose` finds it by walking up from the cwd (like connections.yaml).
#
# The pipeline shape is fixed (inputs -> corpus -> per-item evidence pack -> spec -> draft
# -> critique -> ladder -> lint -> render); two further llm stages (assimilate, digest) close
# the feedback loop from a reviewed document (see the feedback-ingest skill). Everything
# project-specific lives in the files this config points at. Run `bizconnect compose graph`.
#
# The `inputs` stage is configured NOT here but in this repo's connections.yaml (`inputs:`):
# it syncs external source docs (e.g. Google Docs) into local Markdown, read-only. Run it
# with `bizconnect compose run inputs`.

title: "# My document"            # heading used by `render`

items:                            # the per-item dimension (e.g. questions, sections, chapters)
  source: index/items.json        # a JSON file...
  list_key: items                 # ...with the list under this key (omit if the file IS a list)
  id_key: id                      # each item's id field (e.g. "Q1", "S3")
  text_key: text                  # the item's prompt/body field (optional)
  pad: 2                          # zero-pad the trailing number for filenames: Q1 -> Q01 (0 = no pad)

index:                            # OPTIONAL structured evidence index that maps items -> sources
  source: index/corpus.json
  entries_key: entries            # list of evidence entries
  entry_id_key: path              # the field that identifies/cites an entry
  item_map_key: item_evidence     # dict: item-id -> [entry ids]  (or {all: [...], ...} groups)

paths:
  global_context: context/global.md          # the GLOBAL guide injected into every llm step
  local_dir: context/items                   # per-item guides: <id>.md  (human-owned)
  prompts_dir: prompts                        # llm step templates: spec.md draft.md critique.md ladder.md
  answers_dir: answers                        # per-item answers: <id>.md  (human-owned)
  submission: submission/front-matter.md      # laddered-up front matter (human-owned; optional)
  intro: about.md                             # OPTIONAL: intro material injected into `ladder` as {{INTRO}}
  front_matter_template: submission/front-matter-template.md  # OPTIONAL: skeleton `ladder` follows as {{TEMPLATE}}
  build_dir: build                            # scratch: evidence packs, prompts, gen drafts, manifest
  final: final/document.md                    # render output
  # --- feedback roundtrip (optional; see the feedback-ingest skill) ---
  register: register/open-points.md           # local projection of the Notion open-points register
  brief: register/brief.md                    # digest's deliberation view (push to the review Doc)
  feedback_dir: build/feedback                # assimilate/digest scratch + feedback.bundle.md

# lint: unresolved markers to flag in answers, and a provenance token each answer should contain
markers: ["[VERIFY", "[DECISION", "[RECONCILE"]
provenance: "(src:"

# --- prompt placeholders your prompts/<stage>.md may use (filled by compose) ---
#   {{GLOBAL_CONTEXT}}  the global guide            (all llm stages)
#   {{ITEM_ID}}         the item's id               (per-item stages)
#   {{ITEM_TEXT}}       the item's text             (per-item stages)
#   {{EVIDENCE}}        the assembled evidence pack (spec, draft)
#   {{LOCAL_CONTEXT}}   the item's local guide      (draft, critique)
#   {{OUTPUT}}          the item's current answer   (critique)
#   {{ALL_OUTPUTS}}     all answers concatenated    (ladder)
#   {{INTRO}}           intro material (paths.intro) (ladder)
#   {{TEMPLATE}}        front-matter skeleton        (ladder)
#   {{OPEN_POINTS}}     open register points slice   (spec, draft, critique, ladder)
#   {{FEEDBACK}}        captured reviewer feedback   (assimilate)
#   {{REGISTER}}        the open-points register     (assimilate, digest)
